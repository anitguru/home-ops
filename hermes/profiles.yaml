    default_model:
      provider: openai-codex
      model: gpt-5.5
    auxiliary_model:
      provider: openai-codex
      model: gpt-5.4-mini
    mcp_servers:
    - vault
    - cocoindex-home-ops
    - unifi-network
    default_cwd: /Users/sva/Documents/Repos/Github/home-ops
    aliases:
